name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No test script found. Skipping tests."
          fi

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  ami:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Create AMI
        run: |
          echo "Creating AMI..."
          sleep 5
          echo "AMI created."

  deploy:
    needs: ami
    runs-on: ubuntu-latest

    steps:
      - name: Deploy application
        run: |
          echo "Deploying application..."
          sleep 5
          echo "Deployment complete."