# =============================================================================
# Interview Arena AI - CI/CD Pipeline (SSH-based EC2)
# =============================================================================
# This workflow:
#   1. Installs dependencies & runs ESLint
#   2. Runs tests (if any exist)
#   3. Builds the Next.js application (CI verification)
#   4. SSHes into the EC2 instance
#   5. Pulls latest code, installs deps, builds, restarts PM2
#
# No Docker used — deploys directly to the EC2 instance via SSH.
#
# Required GitHub Secrets:
#   EC2_HOST       — Public IP or DNS of the EC2 instance
#   EC2_USER       — SSH username (typically "ubuntu")
#   EC2_SSH_KEY    — Private SSH key (PEM) for authentication
#   NEXT_PUBLIC_API_URL — Backend API URL for the frontend build
# =============================================================================

name: Deploy via SSH

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'images/**'
      - '.gitignore'
      - 'terraform/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'images/**'
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

env:
  NODE_VERSION: '22'
  FRONTEND_DIR: frontend
  BACKEND_DIR: backend

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 1: Build & Deploy
  # ===========================================================================
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ─── Install Dependencies ──────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # ─── Run ESLint ────────────────────────────────────────────────────────
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      # ─── Run Tests (if present) ────────────────────────────────────────────
      - name: Run frontend tests
        working-directory: frontend
        run: npx jest --passWithNoTests --no-coverage 2>/dev/null || echo "No tests found"

      - name: Run backend tests
        working-directory: backend
        run: npm test 2>/dev/null || echo "No tests defined"

      # ─── Build Next.js Application (CI verification) ──────────────────────
      - name: Build Next.js application
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000/api' }}

      # ─── Deploy to EC2 via SSH ─────────────────────────────────────────────
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_timeout: 300s
          script: |
            set -e

            echo "=============================================="
            echo "  Deployment starting on EC2..."
            echo "  Branch: ${{ github.ref_name }}"
            echo "=============================================="

            # ─── Navigate to application directory ──────────────────────────
            cd /app

            # ─── Pull latest code ───────────────────────────────────────────
            echo "[1/5] Pulling latest code..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            echo "  ✓ Code updated to $(git rev-parse --short HEAD)"

            # ─── Install dependencies (backend) ──────────────────────────────
            echo "[2/5] Installing backend dependencies..."
            cd /app/backend
            npm ci --omit=dev
            npx prisma generate
            echo "  ✓ Backend dependencies installed"

            # ─── Install dependencies (frontend) ─────────────────────────────
            echo "[3/5] Installing frontend dependencies..."
            cd /app/frontend
            npm ci
            echo "  ✓ Frontend dependencies installed"

            # ─── Build frontend ──────────────────────────────────────────────
            echo "[4/5] Building Next.js application..."
            export NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000/api' }}"
            npm run build
            echo "  ✓ Build complete"

            # ─── Restart PM2 processes ───────────────────────────────────────
            echo "[5/5] Restarting PM2..."

            # Ensure log directory exists
            mkdir -p /app/logs

            # Restart or start backend process
            if pm2 describe interview-arena-backend > /dev/null 2>&1; then
              pm2 restart interview-arena-backend --update-env
              echo "  ✓ Backend restarted"
            else
              pm2 start /app/backend/src/server.js \
                --name interview-arena-backend \
                --cwd /app/backend \
                -- -p 5000
              echo "  ✓ Backend started"
            fi

            # Restart or start frontend process
            if pm2 describe interview-arena-frontend > /dev/null 2>&1; then
              pm2 restart interview-arena-frontend --update-env
              echo "  ✓ Frontend restarted"
            else
              pm2 start /app/frontend/node_modules/next/dist/bin/next \
                --name interview-arena-frontend \
                --cwd /app/frontend \
                -- start -p 3000
              echo "  ✓ Frontend started"
            fi

            # Save PM2 process list so it persists across reboots
            pm2 save

            echo ""
            echo "=============================================="
            echo "  Deployment complete!"
            echo "=============================================="

      # ─── Post-Deployment Health Check ──────────────────────────────────────
      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Waiting for services to come online..."
            for i in 1 2 3 4 5; do
              BACKEND=$(curl -sf --max-time 5 http://localhost:5000/api/health 2>/dev/null && echo "OK" || echo "FAIL")
              FRONTEND=$(curl -sf --max-time 5 --output /dev/null http://localhost:3000 2>/dev/null && echo "OK" || echo "FAIL")
              echo "  Attempt $i/5 — Backend: $BACKEND, Frontend: $FRONTEND"
              if [ "$BACKEND" = "OK" ] && [ "$FRONTEND" = "OK" ]; then
                echo ""
                echo "=============================================="
                echo "  ✅ All services healthy!"
                echo "=============================================="
                exit 0
              fi
              sleep 5
            done
            echo ""
            echo "=============================================="
            echo "  ⚠ Health check timed out. Check logs:"
            echo "  pm2 logs interview-arena-backend --lines 20"
            echo "  pm2 logs interview-arena-frontend --lines 20"
            echo "=============================================="
            exit 1
